<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f2240"/>
    </linearGradient>
    <linearGradient id="u-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)"/>
  
  <!-- Subtle border -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="none" stroke="url(#accent-grad)" stroke-width="3" opacity="0.4"/>
  
  <!-- Decorative corner accents -->
  <circle cx="72" cy="72" r="8" fill="#06b6d4" opacity="0.6"/>
  <circle cx="440" cy="72" r="6" fill="#10b981" opacity="0.5"/>
  <circle cx="72" cy="440" r="6" fill="#10b981" opacity="0.5"/>
  <circle cx="440" cy="440" r="8" fill="#06b6d4" opacity="0.6"/>
  
  <!-- Main U letter -->
  <path d="M 160 120 
           L 160 320 
           C 160 388 200 430 256 430 
           C 312 430 352 388 352 320 
           L 352 120
           M 352 120 
           L 380 120
           L 380 330 
           C 380 414 328 460 256 460 
           C 184 460 132 414 132 330 
           L 132 120
           L 160 120 Z" 
        fill="url(#u-grad)"/>
  
  <!-- Teal underline accent -->
  <rect x="170" y="440" width="172" height="6" rx="3" fill="url(#accent-grad)" opacity="0.8"/>
</svg>