<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="#0a1628"/>
  <!-- Outer glow ring -->
  <circle cx="90" cy="90" r="75" stroke="url(#g1)" stroke-width="2" fill="none" stroke-dasharray="6 10" opacity="0.35"/>
  <!-- Inner border -->
  <rect x="22" y="22" width="136" height="136" rx="30" stroke="url(#g1)" stroke-width="2.5" fill="none"/>
  <!-- Cursor icon -->
  <path d="M65 118 L65 50 L75 77 L98 77 Z" fill="url(#g2)" filter="url(#glow)"/>
  <line x1="65" y1="118" x2="98" y2="130" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/>
  <!-- Code brackets -->
  <path d="M36 78 L48 90 L36 102" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  <path d="M144 78 L132 90 L144 102" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="90" cy="90" r="6" fill="url(#g1)"/>
  <!-- Corner particles -->
  <circle cx="32" cy="38" r="3.5" fill="#06b6d4" opacity="0.8"/>
  <circle cx="148" cy="36" r="2.5" fill="#10b981" opacity="0.8"/>
  <circle cx="150" cy="142" r="3" fill="#06b6d4" opacity="0.8"/>
  <circle cx="30" cy="144" r="2" fill="#10b981" opacity="0.8"/>
</svg>
